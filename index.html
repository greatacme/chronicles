<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<title>역대상 족보</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:#fff;color:#1a1a1a;
  font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  font-size:13px;
}

header{
  position:sticky;top:0;z-index:100;
  background:#fff;border-bottom:1px solid #e8e8e8;
  padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
header h1{font-size:16px;font-weight:700;color:#1a1a1a;margin-right:4px}
header .sub{font-size:11px;color:#999}
.search-input{
  margin-left:auto;
  background:#f5f5f5;border:1px solid #e0e0e0;color:#1a1a1a;
  padding:5px 12px;border-radius:20px;font-size:16px;font-family:inherit;
  width:160px;outline:none;transition:border .15s;
  -webkit-appearance:none;
}
.search-input:focus{border-color:#4a90d9}
.search-input::placeholder{color:#bbb}
.btn{
  background:#f5f5f5;border:1px solid #e0e0e0;color:#555;
  padding:7px 14px;border-radius:20px;cursor:pointer;font-size:12px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  font-family:inherit;transition:all .15s;
}
.btn:hover{background:#eaf2ff;border-color:#4a90d9;color:#2266bb}

.legend{
  position:sticky;top:0;z-index:99;
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  padding:7px 20px;background:#fafafa;border-bottom:1px solid #efefef;
}
.legend-label{font-size:11px;color:#aaa}
.litem{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.ldot{width:10px;height:10px;border-radius:3px}

#tree-container{
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  padding:16px 20px 60px;
}

/* Tree */
ul.tree{list-style:none;padding-left:0;display:inline-block;min-width:100%}
ul.tree ul{padding-left:0;margin-left:20px;border-left:1.5px solid #e8edf5}
li.tree-node{position:relative;padding-top:4px;white-space:nowrap}
li.tree-node::before{
  content:'';position:absolute;left:-20px;top:17px;
  width:20px;height:1.5px;background:#e8edf5;
}
ul.tree > li.tree-node::before{display:none}
ul.collapsed{display:none}

.node-wrap{display:flex;align-items:center;gap:0;white-space:nowrap}
.toggle{
  width:24px;min-width:24px;height:32px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;flex-shrink:0;
}
.toggle-icon{
  width:13px;height:13px;border-radius:3px;
  background:#f0f0f0;border:1px solid #ddd;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;color:#888;transition:all .12s;line-height:1;
}
.toggle:hover .toggle-icon{background:#dceeff;border-color:#4a90d9;color:#2266bb}
.toggle.leaf .toggle-icon{opacity:0;pointer-events:none}

/* Chip 기본 — type 색이 없는 노드용 fallback */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px 5px 8px;border-radius:6px;
  border:1.5px solid #ccd4e8;
  background:#fff;
  cursor:pointer;transition:all .12s;position:relative;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  white-space:nowrap;
}
.chip-name{font-size:12px;font-weight:500;color:#333}
.chip-ref{font-size:10px;color:#bbb;margin-left:1px}
.count-badge{
  font-size:10px;background:#f0f0f0;border:1px solid #e5e5e5;
  color:#999;border-radius:10px;padding:0 5px;margin-left:2px;
}

/* Tooltip */
.chip-desc{
  display:none;position:absolute;left:calc(100% + 8px);top:50%;
  transform:translateY(-50%);
  background:#333;color:#fff;
  border-radius:6px;padding:5px 10px;font-size:11px;
  white-space:nowrap;z-index:200;pointer-events:none;
  box-shadow:0 2px 10px rgba(0,0,0,.18);
}
.chip:hover .chip-desc{display:block}

.chip[data-type="patriarch"]{background:#ffe878;border-color:#b88800;color:#4a2c00}
.chip[data-type="patriarch"] .chip-name{color:#4a2c00;font-weight:700}
.chip[data-type="patriarch"]:hover{background:#ffd820;border-color:#907000}
.chip[data-type="king"]{background:#90e8ac;border-color:#1a7a40;color:#083018}
.chip[data-type="king"] .chip-name{color:#083018;font-weight:700}
.chip[data-type="king"]:hover{background:#58d880;border-color:#0e5a2c}
.chip[data-type="priest"]{background:#ffc060;border-color:#a05800;color:#3c1c00}
.chip[data-type="priest"] .chip-name{color:#3c1c00;font-weight:700}
.chip[data-type="priest"]:hover{background:#ffa020;border-color:#784000}
.chip[data-type="prophet"]{background:#90bcff;border-color:#1040b0;color:#041040}
.chip[data-type="prophet"] .chip-name{color:#041040;font-weight:700}
.chip[data-type="prophet"]:hover{background:#5898ff;border-color:#082888}
.chip[data-type="notable"]{background:#ff98b0;border-color:#aa1038;color:#440010}
.chip[data-type="notable"] .chip-name{color:#440010;font-weight:700}
.chip[data-type="notable"]:hover{background:#ff6080;border-color:#880020}
.chip[data-type="normal"]{background:#fff;border-color:#ccd4e8;color:#333}
.chip[data-type="normal"] .chip-name{color:#333;font-weight:500}
.chip[data-type="normal"]:hover{background:#eef2ff;border-color:#99aacc}

/* Search states */
/* 검색 히트 */
.highlight > .node-wrap .chip{background:#fff7cc !important;border-color:#e8c000 !important;box-shadow:0 0 0 2px rgba(232,192,0,.25) !important}
.highlight > .node-wrap .chip-name{color:#7a5800 !important}
/* 현재 포커스 인물 */
.search-focus > .node-wrap .chip{background:#ffe033 !important;border-color:#c8a000 !important;box-shadow:0 0 0 3px rgba(200,160,0,.35) !important;transform:translateY(-1px)}
/* 검색 중 비매칭 노드만 흐리게 — 자식에게 전파 안 됨 */
.search-active .tree-node:not(.highlight):not(.search-focus):not(.spouse-parent-hit) > .node-wrap{opacity:0.18}
.spouse-chip.highlight{background:#fff7cc !important;border-color:#e8c000 !important;box-shadow:0 0 0 2px rgba(232,192,0,.25) !important;color:#7a5800 !important}
.spouse-chip.search-focus{background:#ffe033 !important;border-color:#c8a000 !important;box-shadow:0 0 0 3px rgba(200,160,0,.35) !important;transform:translateY(-1px)}




li.is-spouse > .node-wrap::before {
  content: '─♥';
  font-size: 10px;
  color: #e91e8c;
  margin-right: 2px;
}

/* ── 배우자/여성 노드: 부모 chip 오른쪽에 가로로 표시 ── */
.type-female .chip {
  background: #fce4ec;
  border-color: #e91e8c;
  color: #880037;
}
.type-female .chip-name { color: #880037; font-weight: 600; }
.type-female .chip:hover { background: #f8bbd0; border-color: #c0005a; }

/* 딸/누이 — 일반 자녀처럼 표시하되 분홍 테두리로 구분 */
.type-daughter .chip {
  background: #fff0f5;
  border-color: #e91e8c;
  color: #880037;
}
.type-daughter .chip-name { color: #880037; font-weight: 600; }
.type-daughter .chip:hover { background: #ffd6e7; border-color: #c0005a; }

/* female li는 자체 행을 차지하지 않고 인라인으로 */
li.is-spouse {
  display: inline-flex;
  align-items: center;
  margin-left: 0;
  padding-top: 0;
  vertical-align: middle;
}
li.is-spouse::before { display: none !important; }

/* female 노드가 있는 ul의 첫 줄을 flex row로 */
.node-wrap {
  display: flex;
  flex-direction: row;
  align-items: center;
  flex-wrap: nowrap;
  gap: 0;
}

/* ── 배우자 인라인 칩 ── */
.spouse-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  margin-left: 8px;
  padding: 2px 8px 2px 6px;
  border-radius: 20px;
  background: #fce4ec;
  border: 1.5px solid #e91e8c;
  font-size: 11px;
  font-weight: 600;
  color: #880037;
  cursor: default;
  white-space: nowrap;
  vertical-align: middle;
}
.spouse-chip:hover { background: #f8bbd0; }
.sp-heart { color: #e91e8c; font-size: 10px; }
.sp-ref { font-size: 9px; opacity: 0.5; margin-left: 2px; font-weight: 400; }

@media (max-width:600px){
  header{padding:8px 12px;gap:6px}
  header h1{font-size:14px}
  .search-input{width:120px;font-size:16px}
  .btn{padding:6px 10px;font-size:11px}
  #tree-container{padding:12px 12px 60px}
  .chip{font-size:11px;padding:4px 8px 4px 6px}
  .chip-name{font-size:11px}
  .legend{padding:5px 12px;gap:8px;font-size:10px}
}
</style>
</head>
<body>
<header>
  <h1>📜 역대상 족보</h1>
  <span class="sub">대상 1~9장 · 아담부터 포로기 이후까지</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
    <div style="position:relative;display:flex;align-items:center">
      <input class="search-input" type="text" placeholder="인물 검색…" id="search-input"
        oninput="handleSearch(this.value)" onkeydown="handleSearchKey(event)"
        style="padding-right:68px">
      <span id="search-count" style="display:none;position:absolute;right:8px;font-size:10px;color:#999;white-space:nowrap;pointer-events:none"></span>
    </div>
    <button class="btn" id="btn-prev" onclick="searchStep(-1)" style="display:none;padding:5px 10px;font-size:12px">◀</button>
    <button class="btn" id="btn-next" onclick="searchStep(1)"  style="display:none;padding:5px 10px;font-size:12px">▶</button>
    <button class="btn" onclick="resetSearch()" title="검색 초기화">✕</button>
  </div>
  <button class="btn" onclick="expandAll()">전체 펼치기</button>
  <button class="btn" onclick="collapseAll()">전체 접기</button>
</header>
<div class="legend">

  <div class="litem"><div class="ldot" style="background:#ffe878;border:1.5px solid #b88800"></div>족장</div>

  <div class="litem"><div class="ldot" style="background:#fce4ec;border:1.5px solid #e91e8c"></div>배우자</div>
  <div class="litem"><div class="ldot" style="background:#fff0f5;border:1.5px solid #e91e8c"></div>딸/누이</div>
  <span class="legend-label" style="margin-left:6px">※ 클릭으로 접기/펼치기 · 마우스 오버로 설명 확인</span>
</div>
<div id="tree-container">
  <ul class="tree" id="root-tree"></ul>
</div>

// ── 트리 빌드 ──
var map = {};
function buildTree() {
  var k;
  for(k in map) { delete map[k]; }
  var i, n, id, name, type, ref, desc, parentId;
  for(i=0; i<NODES.length; i++) {
    n=NODES[i];
    id=n[0]; name=n[1]; type=n[2]; ref=n[3]; desc=n[4]; parentId=n[5];
    map[id] = {id:id, name:name, type:type, ref:ref, desc:desc, parentId:parentId, children:[]};
  }
  var root = null;
  for(i=0; i<NODES.length; i++) {
    n=NODES[i]; id=n[0]; parentId=n[5];
    if(parentId === null) root = map[id];
    else if(map[parentId]) map[parentId].children.push(map[id]);
  }
  return root;
}

function countDesc(node) {
  var total = 0;
  for(var i=0; i<node.children.length; i++) {
    total += 1 + countDesc(node.children[i]);
  }
  return total;
}

function buildNodeEl(node) {
  var hasChildren = node.children.length > 0;
  var total = countDesc(node);

  var li = document.createElement('li');
  li.className = 'tree-node type-' + node.type;
  li.setAttribute('data-id', node.id);
  li.setAttribute('data-name', node.name);

  var wrap = document.createElement('div');
  wrap.className = 'node-wrap';

  var toggle = document.createElement('div');
  toggle.className = 'toggle' + (hasChildren ? '' : ' leaf');
  var icon = document.createElement('div');
  icon.className = 'toggle-icon';
  icon.textContent = hasChildren ? '\u25bc' : '';
  toggle.appendChild(icon);
  wrap.appendChild(toggle);

  var chip = document.createElement('div');
  chip.className = 'chip';
  chip.setAttribute('data-type', node.type);

  var nameSpan = document.createElement('span');
  nameSpan.className = 'chip-name';
  nameSpan.textContent = node.name;
  chip.appendChild(nameSpan);

  if(node.ref) {
    var refSpan = document.createElement('span');
    refSpan.className = 'chip-ref';
    refSpan.textContent = '\ub300\uc0c1' + node.ref;
    chip.appendChild(refSpan);
  }
  if(hasChildren) {
    var badge = document.createElement('span');
    badge.className = 'count-badge';
    badge.textContent = total;
    chip.appendChild(badge);
  }
  if(node.desc) {
    var tip = document.createElement('div');
    tip.className = 'chip-desc';
    tip.textContent = node.desc;
    chip.appendChild(tip);
  }
  wrap.appendChild(chip);
  li.appendChild(wrap);

  if(hasChildren) {
    var ul = document.createElement('ul');
    ul.classList.add('collapsed');

    ul._ensureRendered = function() {
      if(ul._rendered) return;
      ul._rendered = true;
      for(var ci=0; ci<node.children.length; ci++) {
        var child = node.children[ci];
        if(child.type === 'female') {
          /* 배우자: node-wrap 옆 인라인 칩 */
          var sp = document.createElement('span');
          sp.className = 'spouse-chip';
          sp.setAttribute('data-id', child.id);
          sp.setAttribute('data-name', child.name);
          sp.setAttribute('data-parent-id', node.id);
          sp.title = child.desc || '';
          sp.innerHTML = '<span class="sp-heart">\u2665</span><span class="sp-name">' + child.name + '</span><span class="sp-ref">\ub300\uc0c1' + child.ref + '</span>';
          wrap.appendChild(sp);
        } else {
          /* daughter 포함 나머지: 일반 자녀로 표시 */
          ul.appendChild(buildNodeEl(child));
        }
      }
    };

    (function(iconRef, ulRef, nodeRef, wrapRef) {
      function doToggle() {
        var willOpen = ulRef.classList.contains('collapsed');
        if(willOpen) ulRef._ensureRendered();
        if(ulRef.classList.contains('collapsed')) {
          ulRef.classList.remove('collapsed');
          iconRef.textContent = '\u25bc';
        } else {
          ulRef.classList.add('collapsed');
          iconRef.textContent = '\u25b6';
        }
      }
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        clearSearchHighlight();
        doToggle();
      });
      chip.addEventListener('click', function(e) {
        e.stopPropagation();
        clearSearchHighlight();
        doToggle();
      });
    })(icon, ul, node, wrap);

    li.appendChild(ul);
  }
  return li;
}

// ── 접기/펼치기 ──
function openAll(li) {
  var ul = li.querySelector('ul');
  if(!ul) return;
  var nid = li.getAttribute('data-id');
  if(nid && map[nid] && ul._ensureRendered) ul._ensureRendered();
  if(ul.classList.contains('collapsed')) {
    ul.classList.remove('collapsed');
    var ic = li.querySelector('.toggle-icon');
    if(ic) ic.textContent = '\u25bc';
  }
  var children = ul.querySelectorAll(':scope > li');
  for(var i=0; i<children.length; i++) openAll(children[i]);
}

function expandAll() {
  clearSearchHighlight(); srSnapshot = null;
  var rootLi = document.querySelector('#root-tree > li');
  if(rootLi) openAll(rootLi);
}

function collapseAll() {
  clearSearchHighlight(); srSnapshot = null;
  var uls = document.querySelectorAll('ul.tree ul');
  for(var i=0; i<uls.length; i++) {
    uls[i].classList.add('collapsed');
    var ic = uls[i].parentElement && uls[i].parentElement.querySelector('.toggle-icon');
    if(ic) ic.textContent = '\u25b6';
  }
}

// ── 검색 ──
var srResults = [];
var srIdx = 0;
var srSnapshot = null;

function snapshotCollapse() {
  var snap = [], uls = document.querySelectorAll('ul.tree ul');
  for(var i=0; i<uls.length; i++) snap.push({ul:uls[i], was:uls[i].classList.contains('collapsed')});
  return snap;
}
function restoreCollapse(snap) {
  if(!snap) return;
  for(var i=0; i<snap.length; i++) {
    var ul=snap[i].ul, was=snap[i].was;
    if(was) ul.classList.add('collapsed'); else ul.classList.remove('collapsed');
    var ic = ul.parentElement && ul.parentElement.querySelector('.toggle-icon');
    if(ic) ic.textContent = was ? '\u25b6' : '\u25bc';
  }
}
function collapseAllUls() {
  var uls = document.querySelectorAll('ul.tree ul');
  for(var i=0; i<uls.length; i++) {
    uls[i].classList.add('collapsed');
    var ic = uls[i].parentElement && uls[i].parentElement.querySelector('.toggle-icon');
    if(ic) ic.textContent = '\u25b6';
  }
}

function clearSearchHighlight() {
  var nodes = document.querySelectorAll('.tree-node');
  for(var i=0; i<nodes.length; i++) {
    nodes[i].classList.remove('highlight','search-focus','spouse-parent-hit');
  }
  var spouseHits = document.querySelectorAll('.spouse-chip.highlight, .spouse-chip.search-focus');
  for(var si=0; si<spouseHits.length; si++) {
    spouseHits[si].classList.remove('highlight','search-focus');
  }
  var rt = document.getElementById('root-tree');
  if(rt) rt.classList.remove('search-active');
  srResults=[]; srIdx=0;
  var cnt=document.getElementById('search-count');
  if(cnt) cnt.style.display='none';
  var bp=document.getElementById('btn-prev'), bn=document.getElementById('btn-next');
  if(bp) bp.style.display='none';
  if(bn) bn.style.display='none';
}
function clearSearch() {
  clearSearchHighlight();
  if(srSnapshot) { restoreCollapse(srSnapshot); srSnapshot=null; }
}

function scrollToNode(el) {
  var target = el.classList && el.classList.contains('spouse-chip') ? el : el.querySelector('.chip');
  if(target && target.scrollIntoView) target.scrollIntoView({behavior:'smooth', block:'center'});
}
function focusResult(idx) {
  var nodes = document.querySelectorAll('.search-focus');
  for(var i=0; i<nodes.length; i++) nodes[i].classList.remove('search-focus');
  var parents = document.querySelectorAll('.spouse-parent-hit');
  for(var pi=0; pi<parents.length; pi++) parents[pi].classList.remove('spouse-parent-hit');
  if(!srResults.length) return;
  srIdx = ((idx % srResults.length) + srResults.length) % srResults.length;
  srResults[srIdx].classList.add('search-focus');
  if(srResults[srIdx].classList.contains('spouse-chip')) {
    var pid = srResults[srIdx].getAttribute('data-parent-id');
    var pli = document.querySelector('.tree-node[data-id="'+pid+'"]');
    if(pli) pli.classList.add('spouse-parent-hit');
  }
  scrollToNode(srResults[srIdx]);
  var cnt=document.getElementById('search-count');
  if(cnt) cnt.textContent = srResults.length===1 ? '1\uac74' : (srIdx+1)+' / '+srResults.length;
}

function openPathTo(targetId) {
  var path=[], cur=map[targetId];
  while(cur){ path.unshift(cur.id); cur=cur.parentId ? map[cur.parentId] : null; }
  for(var i=0; i<path.length-1; i++) {
    var pid=path[i];
    var pli=document.querySelector('.tree-node[data-id="'+pid+'"]');
    if(!pli) {
      var ppid=map[pid]?map[pid].parentId:null;
      if(!ppid) break;
      var ppli=document.querySelector('.tree-node[data-id="'+ppid+'"]');
      if(!ppli) break;
      var ppul=ppli.querySelector('ul');
      if(ppul && ppul._ensureRendered) ppul._ensureRendered();
      pli=document.querySelector('.tree-node[data-id="'+pid+'"]');
    }
    if(!pli) break;
    var pul=pli.querySelector('ul');
    if(pul) {
      if(pul._ensureRendered) pul._ensureRendered();
      pul.classList.remove('collapsed');
      var ic=pli.querySelector('.toggle-icon');
      if(ic) ic.textContent='\u25bc';
    }
  }
}

function handleSearch(val) {
  var nodes, i;
  nodes=document.querySelectorAll('.tree-node');
  for(i=0;i<nodes.length;i++) nodes[i].classList.remove('highlight','search-focus','spouse-parent-hit');
  var spouseHits=document.querySelectorAll('.spouse-chip.highlight, .spouse-chip.search-focus');
  for(i=0;i<spouseHits.length;i++) spouseHits[i].classList.remove('highlight','search-focus');
  var rt=document.getElementById('root-tree');
  if(rt) rt.classList.remove('search-active');
  srResults=[]; srIdx=0;
  var cnt=document.getElementById('search-count');
  var bp=document.getElementById('btn-prev'), bn=document.getElementById('btn-next');
  if(cnt) cnt.style.display='none';
  if(bp) bp.style.display='none';
  if(bn) bn.style.display='none';

  if(!val || !val.trim()) {
    if(srSnapshot){ restoreCollapse(srSnapshot); srSnapshot=null; }
    return;
  }
  if(!srSnapshot) srSnapshot=snapshotCollapse();

  var q=val.trim();
  var matchIds=[];
  for(var k in map){ if(map[k].name && map[k].name.indexOf(q)>=0) matchIds.push(k); }
  if(!matchIds.length) {
    if(cnt){ cnt.textContent='0\uac74'; cnt.style.display='block'; }
    return;
  }

  collapseAllUls();
  for(i=0;i<matchIds.length;i++) openPathTo(matchIds[i]);

  if(rt) rt.classList.add('search-active');
  srResults=[];
  for(i=0;i<matchIds.length;i++) {
    var li=document.querySelector('.tree-node[data-id="'+matchIds[i]+'"]');
    if(li){ li.classList.add('highlight'); srResults.push(li); continue; }
    var sp=document.querySelector('.spouse-chip[data-id="'+matchIds[i]+'"]');
    if(sp){
      sp.classList.add('highlight');
      var pid=sp.getAttribute('data-parent-id');
      var pli=document.querySelector('.tree-node[data-id="'+pid+'"]');
      if(pli) pli.classList.add('spouse-parent-hit');
      srResults.push(sp);
    }
  }
  if(cnt){ cnt.style.display='block'; }
  if(srResults.length>1){ if(bp) bp.style.display=''; if(bn) bn.style.display=''; }
  focusResult(0);
}
function searchStep(dir){ focusResult(srIdx+dir); }
function handleSearchKey(e) {
  var key=e.key||e.keyCode;
  if(key==='Enter'||key===13){ e.shiftKey?searchStep(-1):searchStep(1); }
  else if(key==='Escape'||key===27){ resetSearch(); }
}
function resetSearch() {
  var si=document.getElementById('search-input');
  if(si) si.value='';
  clearSearch();
}

// ── preExpand ──
function preExpand(nodeId, depth, maxDepth) {
  if(depth>maxDepth) return;
  var n=map[nodeId];
  if(!n||!n.children.length) return;
  var li=document.querySelector('.tree-node[data-id="'+nodeId+'"]');
  if(!li) return;
  var ul=li.querySelector('ul');
  if(!ul) return;
  if(ul._ensureRendered) ul._ensureRendered();
  ul.classList.remove('collapsed');
  var ic=li.querySelector('.toggle-icon');
  if(ic) ic.textContent='\u25bc';
  if(depth<maxDepth) {
    for(var i=0;i<n.children.length;i++) preExpand(n.children[i].id, depth+1, maxDepth);
  }
}

// ── 초기화 ──
var root = buildTree();
var rootEl = buildNodeEl(root);
document.getElementById('root-tree').appendChild(rootEl);
preExpand('adam', 0, 1);

// 아무 데나 클릭하면 검색 흐림 해제
document.addEventListener('click', function() {
  var rt = document.getElementById('root-tree');
  if(rt && rt.classList.contains('search-active')) {
    clearSearchHighlight();
  }
});
